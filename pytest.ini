[pytest]
markers =
    api: API-level tests against service contracts
    integration: live integration tests against external services
    movies: tests for the movies API
    smoke: critical happy-path checks
    regression: broader regression coverage
    negative: negative API scenarios
    schema: response schema validation checks
    db: checks that verify data in the database
    slow: tests with noticeably longer runtime
    flaky: rerun unstable tests caused by external infrastructure
    unit: isolated unit tests with mocks
